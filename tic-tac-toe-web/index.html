<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe - Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>
    <div class="background-shapes"></div>
    <div class="dashboard-container">
        <main class="dashboard-main">
            <h1 class="game-title">
                <span class="title-tic">TIC</span>
                <span class="title-tac">TAC</span>
                <span class="title-toe">TOE</span>
            </h1>
            <div class="board-preview-container">
                <div class="board-preview">
                    <div class="cell">X</div><div class="cell">O</div><div class="cell">X</div>
                    <div class="cell">O</div><div class="cell">X</div><div class="cell">O</div>
                    <div class="cell">X</div><div class="cell">O</div><div class="cell">X</div>
                </div>
            </div>
            <button id="startButton" class="start-game-btn">
                START GAME
            </button>
        </main>
    </div>
    <script src="dashboard.js"></script>
</body>
</html>
